site_name: EpochCore Docs
site_description: Public documentation & architecture overview for the EpochCore platform.
site_url: https://epochcoreqcs.com
repo_url: https://github.com/QuantumSwarms/epochcore-docs
repo_name: QuantumSwarms/epochcore-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Overview: overview.md
  - D-KaP: dkap.md
  - EpochOS: epochos.md
  - EpochPay: epochpay.md
  - EpochCoverage: epochcoverage.md
  - QuantumSwarms: quantumswarms.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed
